<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ระบบตรวจสอบแปลงที่ดิน (MS4W Optimized)</title>
    <!-- Libraries -->
    <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <style>
        #map { height: calc(100vh - 360px); width: 100%; background: #1a1a1a; cursor: crosshair; }
        @media (min-width: 768px) { #map { height: calc(100vh - 240px); } }
        .layer-item { font-size: 0.7rem; padding: 2px 8px; border-radius: 99px; background: #f3f4f6; border: 1px solid #d1d5db; display: flex; align-items: center; gap: 4px; }
        .drone-badge { background: #f59e0b; color: white; border-color: #d97706; }
        .geojson-badge { background: #6366f1; color: white; border-color: #4f46e5; }
        .loading-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 9999; justify-content: center; align-items: center; color: white; flex-direction: column; }
        .status-msg { font-size: 11px; margin-top: 5px; font-weight: bold; }
    </style>
</head>
<body class="bg-gray-50 font-sans overflow-x-hidden">

    <div id="loader" class="loading-overlay">
        <div class="animate-spin rounded-full h-12 w-12 border-t-4 border-b-4 border-white mb-4"></div>
        <p class="font-bold text-lg">กำลังประมวลผล...</p>
    </div>

    <header class="bg-slate-900 text-white p-3 shadow-xl">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-sm md:text-lg font-bold flex items-center gap-2">🌍 ระบบตรวจสอบที่ดิน (MS4W)</h1>
            <div id="coordDisplay" class="text-[10px] font-mono bg-slate-800 px-2 py-1 rounded border border-slate-700 text-emerald-400">พร้อมใช้งาน</div>
        </div>
    </header>

    <div class="p-3 bg-white shadow-sm border-b flex flex-col gap-3">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
            <!-- 1. นำเข้า GeoJSON -->
            <div class="border-2 border-dashed border-indigo-200 rounded-xl p-2 hover:bg-indigo-50">
                <label class="block text-[10px] font-bold text-indigo-600 uppercase mb-1">1. ไฟล์แปลงที่ดิน (.geojson)</label>
                <input type="file" id="geojsonInput" accept=".geojson,.json" multiple
                       class="block w-full text-[10px] text-gray-500 file:mr-2 file:py-1 file:px-3 file:rounded-full file:border-0 file:text-[10px] file:font-bold file:bg-indigo-600 file:text-white cursor-pointer"/>
            </div>

            <!-- 2. จัดการรูปภาพโดรน -->
            <div class="border-2 border-solid border-orange-200 rounded-xl p-2 bg-orange-50/30">
                <label class="block text-[10px] font-bold text-orange-600 uppercase mb-1">2. ข้อมูลภาพโดรน (Apache MS4W)</label>
                
                <div class="mb-2">
                    <label class="text-[9px] text-gray-500 block mb-1">URL แหล่งข้อมูล (XYZ Tiles)</label>
                    <input type="text" id="tileServerUrl" value="http://localhost/tiles" 
                           placeholder="เช่น http://localhost/tiles"
                           class="w-full text-[10px] p-1.5 border rounded bg-white font-mono">
                </div>

                <div class="flex flex-col gap-2">
                    <button id="quickLoadBtn" onclick="loadFixedPathTiles()" 
                            class="w-full flex items-center justify-center gap-2 py-2 px-3 bg-orange-500 text-white rounded-lg text-xs font-bold hover:bg-orange-600 shadow-sm transition-all active:scale-95">
                        <span>🔄</span> โหลด/รีเฟรชภาพโดรน
                    </button>
                    <div id="statusMsg" class="status-msg text-center"></div>
                </div>
            </div>
        </div>
        
        <div class="flex justify-between items-center">
            <div id="layerList" class="flex gap-2 overflow-x-auto pb-1"></div>
            <button onclick="clearLayers()" class="text-[10px] font-bold text-red-500 ml-2 whitespace-nowrap bg-red-50 px-2 py-1 rounded">ล้างทั้งหมด</button>
        </div>
    </div>

    <div id="map"></div>

    <div id="resultPanel" class="fixed bottom-6 left-1/2 -translate-x-1/2 z-[1000] w-[92%] max-w-sm bg-white p-4 rounded-2xl shadow-2xl border border-gray-100 hidden">
        <div class="flex justify-between items-start mb-1">
            <h3 class="text-gray-400 text-[9px] font-bold uppercase tracking-tight">รหัสแปลงที่ดิน</h3>
            <button onclick="closePanel()" class="bg-gray-100 p-1.5 rounded-full text-gray-400">✕</button>
        </div>
        <div id="parcelDisplay" class="text-2xl font-black text-slate-800 break-all leading-tight">----</div>
        <div id="layerSource" class="text-[9px] text-gray-400 mt-1 italic"></div>
    </div>

    <script>
        let map;
        let geoLayers = [];
        let droneTileLayer = null;

        function initMap() {
            const lastPos = JSON.parse(localStorage.getItem('map_last_pos') || '{"lat": 15.418727, "lng": 103.057069, "zoom": 16}');
            
            map = L.map('map', { 
                zoomControl: false, 
                maxZoom: 22,
                preferCanvas: true 
            }).setView([lastPos.lat, lastPos.lng], lastPos.zoom);

            L.control.zoom({ position: 'topright' }).addTo(map);

            // 🟢 1. โหลด Google Satellite เป็นพื้นหลัง (zIndex: 0)
            L.tileLayer('https://{s}.google.com/vt/lyrs=s,h&x={x}&y={y}&z={z}', {
                maxZoom: 22,
                subdomains:['mt0','mt1','mt2','mt3'],
                zIndex: 0
            }).addTo(map);

            // 🟢 2. โหลดภาพโดรนทันที (Auto-load) เหมือนในโค้ด OpenLayers ของคุณ
            loadFixedPathTiles();

            map.on('moveend', () => {
                const center = map.getCenter();
                localStorage.setItem('map_last_pos', JSON.stringify({ 
                    lat: center.lat, lng: center.lng, zoom: map.getZoom() 
                }));
            });

            map.on('click', (e) => {
                const result = findParcelCodeAtPoint(e.latlng);
                if (result) showResult(result.code, result.fileName, false);
                else showResult("ไม่พบข้อมูล", "อยู่นอกเขตแปลงที่โหลดไว้", true);
            });
        }

        function loadFixedPathTiles() {
            const status = document.getElementById('statusMsg');
            let baseUrl = document.getElementById('tileServerUrl').value.trim();
            if (baseUrl.endsWith('/')) baseUrl = baseUrl.slice(0, -1);
            
            const tilePattern = `${baseUrl}/{z}/{x}/{y}.png`;
            
            status.textContent = `🔄 กำลังดึง Tiles...`;
            status.className = "status-msg text-center text-orange-500";
            status.classList.remove('hidden');

            if (droneTileLayer) map.removeLayer(droneTileLayer);

            // ✅ zIndex: 10 เพื่อให้ทับ Google Satellite (เหมือนใน OpenLayers zIndex: 1)
            droneTileLayer = L.tileLayer(tilePattern, {
                maxZoom: 22,
                minZoom: 0,
                zIndex: 10, 
                opacity: 1.0,
                crossOrigin: 'anonymous', 
                errorTileUrl: 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII='
            });

            let hasSuccess = false;
            droneTileLayer.on('tileload', () => {
                if (!hasSuccess) {
                    hasSuccess = true;
                    status.textContent = "✅ เชื่อมต่อภาพโดรนสำเร็จ";
                    status.className = "status-msg text-center text-emerald-600";
                }
            });

            droneTileLayer.on('tileerror', () => {
                if (!hasSuccess) {
                    status.innerHTML = `❌ ไม่พบภาพที่: ${baseUrl}`;
                    status.className = "status-msg text-center text-red-500";
                }
            });

            droneTileLayer.addTo(map);
            updateUI();
        }

        document.getElementById('geojsonInput').addEventListener('change', async function(e) {
            const files = Array.from(e.target.files);
            document.getElementById('loader').style.display = 'flex';
            for (const file of files) {
                try {
                    const data = JSON.parse(await file.text());
                    const layer = L.geoJSON(data, {
                        style: { color: '#00ffff', weight: 2, fillOpacity: 0.1 }
                    }).addTo(map);
                    geoLayers.push({ name: file.name, layer: layer });
                    if (geoLayers.length === 1) map.fitBounds(layer.getBounds());
                } catch (err) { console.error(err); }
            }
            updateUI();
            document.getElementById('loader').style.display = 'none';
        });

        function findParcelCodeAtPoint(latlng) {
            const point = turf.point([latlng.lng, latlng.lat]);
            for (let i = geoLayers.length - 1; i >= 0; i--) {
                const { layer, name } = geoLayers[i];
                let foundCode = null;
                layer.eachLayer(l => {
                    if (foundCode) return;
                    try {
                        if (l.feature && turf.booleanPointInPolygon(point, l.feature)) {
                            const p = l.feature.properties;
                            foundCode = p.parcel_cod || p.Parcel_cod || p.PARCEL_COD || p.id || p.code;
                        }
                    } catch (e) {}
                });
                if (foundCode) return { code: foundCode, fileName: name };
            }
            return null;
        }

        function updateUI() {
            const list = document.getElementById('layerList');
            let html = '';
            geoLayers.forEach(l => html += `<span class="layer-item geojson-badge">📄 ${l.name}</span>`);
            if (droneTileLayer) html += `<span class="layer-item drone-badge">🚁 ภาพโดรน</span>`;
            list.innerHTML = html;
        }

        function clearLayers() {
            geoLayers.forEach(l => map.removeLayer(l.layer));
            if (droneTileLayer) map.removeLayer(droneTileLayer);
            geoLayers = []; droneTileLayer = null;
            document.getElementById('statusMsg').classList.add('hidden');
            updateUI(); closePanel();
        }

        function showResult(text, source, isError) {
            const display = document.getElementById('parcelDisplay');
            display.textContent = text;
            display.className = isError ? "text-lg font-bold text-red-500" : "text-2xl font-black text-slate-800";
            document.getElementById('layerSource').textContent = `ที่มา: ${source}`;
            document.getElementById('resultPanel').classList.remove('hidden');
        }

        function closePanel() { document.getElementById('resultPanel').classList.add('hidden'); }
        window.onload = initMap;
    </script>
</body>
</html>
