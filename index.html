<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ระบบตรวจสอบแปลงที่ดิน Pro (Visual Fixed)</title>
    
    <!-- Dependencies -->
    <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- OpenLayers -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@v10.3.1/ol.css">
    <script src="https://cdn.jsdelivr.net/npm/ol@v10.3.1/dist/ol.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Prompt:wght@300;400;600&display=swap');

        :root { 
            --ai-blue: #3b82f6; 
            --ai-dark: #0f172a;
            --glass-bg: rgba(255, 255, 255, 0.85);
        }

        body { 
            font-family: 'Prompt', sans-serif;
            -webkit-tap-highlight-color: transparent; 
        }

        #map { height: calc(100vh - 280px); width: 100%; background: #1a1a1a; position: relative; }
        @media (min-width: 768px) { #map { height: calc(100vh - 200px); } }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        /* AI Modern Buttons */
        .ai-tool-btn {
            width: 48px; height: 48px; border-radius: 16px;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: white; color: var(--ai-dark);
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            cursor: pointer;
        }
        .ai-tool-btn.active {
            background: var(--ai-blue); color: white;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
        }

        /* ปุ่มตำแหน่งปัจจุบันสไตล์ Google Maps */
        .my-location-btn {
            width: 50px; height: 50px; border-radius: 50%;
            background: white; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3); cursor: pointer;
        }
        .my-location-btn svg { width: 24px; height: 24px; fill: #4285F4; }

        /* ปุ่มเพิ่มจุด (Add Point) */
        .ai-fab-add {
            width: 64px; height: 64px; border-radius: 20px;
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 10px 25px rgba(37, 99, 235, 0.4);
            border: 2px solid rgba(255, 255, 255, 0.2);
        }
        .ai-fab-add svg { width: 32px; height: 32px; stroke: white; stroke-width: 3; }

        #crosshair {
            position: absolute; left: 50%; bottom: 65%; 
            transform: translate(-50%, 50%); z-index: 500;
            pointer-events: none; display: none;
        }

        .draw-controls {
            position: absolute; bottom: 30px; right: 30px;
            z-index: 1000; display: none; flex-direction: column;
            align-items: center; gap: 16px;
        }
    </style>
</head>
<body class="bg-slate-50 overflow-x-hidden text-slate-900">

    <header class="bg-slate-900/95 backdrop-blur-md text-white p-4 shadow-xl sticky top-0 z-[1001] border-b border-white/10">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="p-2 bg-blue-500 rounded-lg">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M11 3.055A9.001 9.001 0 1020.945 13H11V3.055z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M20.488 9H15V3.512A9.025 9.025 0 0120.488 9z"></path></svg>
                </div>
                <div>
                    <h1 class="text-sm font-black tracking-tight">PARCEL VISUAL FIX</h1>
                    <p class="text-[9px] text-blue-400 font-bold tracking-widest uppercase">Node & Label Refined</p>
                </div>
            </div>
            <div id="coordDisplay" class="text-[11px] font-mono bg-white/5 px-4 py-2 rounded-xl border border-white/10 text-blue-300">
                SYSTEM READY
            </div>
        </div>
    </header>

    <div class="p-4 glass-panel border-b flex flex-col gap-4">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <input type="file" id="geojsonInput" accept=".geojson,.json" multiple class="block w-full text-xs text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-[10px] file:font-bold file:bg-blue-50 file:text-blue-700"/>
            <input type="file" id="folderInput" webkitdirectory directory class="block w-full text-xs text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-[10px] file:font-bold file:bg-indigo-50 file:text-indigo-700"/>
        </div>
        <div id="layerList" class="flex gap-2 overflow-x-auto pb-1 no-scrollbar"></div>
    </div>

    <div class="relative">
        <div id="map">
            <div id="crosshair">
                <svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="50" cy="50" r="2.5" fill="white"/>
                    <circle cx="50" cy="50" r="26" stroke="white" stroke-width="3"/>
                    <path d="M50 0V24M50 76V100M0 50H24M76 50H100" stroke="white" stroke-width="3" stroke-linecap="round"/>
                </svg>
            </div>
        </div>
        
        <div class="absolute top-6 left-6 z-[1000] flex flex-col gap-4">
            <div onclick="getCurrentLocation()" class="my-location-btn">
                <svg viewBox="0 0 24 24"><path d="M12 8c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4zm8.94 3c-.46-4.17-3.77-7.48-7.94-7.94V1h-2v2.06C6.83 3.52 3.52 6.83 3.06 11H1v2h2.06c.46 4.17 3.77 7.48 7.94 7.94V23h2v-2.06c4.17-.46 7.48-3.77 7.94-7.94H23v-2h-2.06zM12 19c-3.87 0-7-3.13-7-7s3.13-7 7-7 7 3.13 7 7-3.13 7-7 7z"/></svg>
            </div>

            <div class="flex flex-col gap-2 p-1.5 glass-panel rounded-2xl">
                <div id="measureLineBtn" onclick="toggleMeasure('LineString')" class="ai-tool-btn">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg>
                </div>
                <div id="measureAreaBtn" onclick="toggleMeasure('Polygon')" class="ai-tool-btn">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 7v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2H6c-1.1 0-2 .9-2 2z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5v14M15 5v14"></path></svg>
                </div>
            </div>
        </div>

        <div id="drawControls" class="draw-controls">
            <button onclick="undoPoint()" class="w-12 h-12 rounded-2xl bg-white flex items-center justify-center shadow-lg" title="ย้อนกลับ">
                <svg class="w-6 h-6 text-slate-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M3 10h10a8 8 0 018 8v2M3 10l6 6m-6-6l6-6"></path></svg>
            </button>
            <button onclick="addPointAtCrosshair()" class="ai-fab-add">
                <svg fill="none" viewBox="0 0 24 24" stroke="white"><path d="M12 4v16m8-8H4" /></svg>
            </button>
        </div>
    </div>

    <script>
        let map, droneLayer, vectorLayers = [];
        let measureSource, measureVector, draftSource, draftVector;
        let activeMeasureType = null;

        // --- STYLING CONSTANTS ---
        const NODE_STYLE = new ol.style.Style({
            image: new ol.style.Circle({
                radius: 6,
                fill: new ol.style.Fill({ color: '#ffffff' }),
                stroke: new ol.style.Stroke({ color: '#3b82f6', width: 2 })
            })
        });

        const DRAFT_LINE_STYLE = new ol.style.Style({
            stroke: new ol.style.Stroke({
                color: '#ffffff',
                width: 3,
                lineDash: [10, 10]
            })
        });

        const createLabelStyle = (text) => {
            return new ol.style.Text({
                text: text,
                font: 'bold 14px Prompt, sans-serif',
                fill: new ol.style.Fill({ color: '#3b82f6' }),
                stroke: new ol.style.Stroke({ color: '#ffffff', width: 4 }),
                offsetY: -15
            });
        };

        const measureStyle = (feature) => {
            const geom = feature.getGeometry();
            const styles = [
                new ol.style.Style({
                    stroke: new ol.style.Stroke({ color: '#3b82f6', width: 4 }),
                    fill: new ol.style.Fill({ color: 'rgba(59, 130, 246, 0.2)' })
                })
            ];

            // วาด Node สีขาวในทุกจุด
            if (geom.getType() === 'LineString') {
                geom.getCoordinates().forEach(coord => {
                    styles.push(new ol.style.Style({
                        geometry: new ol.geom.Point(coord),
                        image: NODE_STYLE.getImage()
                    }));
                });

                // วาดป้ายระยะทาง
                const coords = geom.getCoordinates();
                for (let i = 0; i < coords.length - 1; i++) {
                    const midpoint = [(coords[i][0] + coords[i+1][0]) / 2, (coords[i][1] + coords[i+1][1]) / 2];
                    const len = ol.sphere.getLength(new ol.geom.LineString([coords[i], coords[i+1]]));
                    styles.push(new ol.style.Style({
                        geometry: new ol.geom.Point(midpoint),
                        text: createLabelStyle(len > 1000 ? (len/1000).toFixed(2)+' กม.' : len.toFixed(1)+' ม.')
                    }));
                }
            } else if (geom.getType() === 'Polygon') {
                geom.getCoordinates()[0].forEach(coord => {
                    styles.push(new ol.style.Style({
                        geometry: new ol.geom.Point(coord),
                        image: NODE_STYLE.getImage()
                    }));
                });

                styles.push(new ol.style.Style({
                    geometry: geom.getInteriorPoint(),
                    text: createLabelStyle(formatThaiArea(ol.sphere.getArea(geom)))
                }));
            }
            return styles;
        };

        function init() {
            const lastPos = JSON.parse(localStorage.getItem('ol_pos_vfix') || '{"lon":103.057069,"lat":15.418727,"zoom":16}');

            map = new ol.Map({
                target: 'map',
                layers: [
                    new ol.layer.Tile({ source: new ol.source.XYZ({ url: 'https://mt{0-3}.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', maxZoom: 22 }) }),
                    draftVector = new ol.layer.Vector({ source: new ol.source.Vector(), style: DRAFT_LINE_STYLE, zIndex: 90 }),
                    measureVector = new ol.layer.Vector({ source: new ol.source.Vector(), style: measureStyle, zIndex: 100 })
                ],
                view: new ol.View({ center: ol.proj.fromLonLat([lastPos.lon, lastPos.lat]), zoom: lastPos.zoom, maxZoom: 24 })
            });

            measureSource = measureVector.getSource();
            draftSource = draftVector.getSource();

            map.on('moveend', () => {
                const v = map.getView();
                const c = ol.proj.toLonLat(v.getCenter());
                localStorage.setItem('ol_pos_vfix', JSON.stringify({ lon: c[0], lat: c[1], zoom: v.getZoom() }));
                updateDraftLine();
            });
            map.getView().on('change:center', updateDraftLine);
        }

        function getCrosshairMapCoordinate() {
            const size = map.getSize();
            return map.getCoordinateFromPixel([size[0] / 2, size[1] * 0.35]);
        }

        function updateDraftLine() {
            if (!activeMeasureType) return;
            draftSource.clear();
            const features = measureSource.getFeatures();
            if (!features.length) return;

            const crosshair = getCrosshairMapCoordinate();
            const geom = features[0].getGeometry();

            if (activeMeasureType === 'LineString') {
                const coords = geom.getCoordinates();
                draftSource.addFeature(new ol.Feature(new ol.geom.LineString([coords[coords.length - 1], crosshair])));
            } else if (activeMeasureType === 'Polygon') {
                const ring = geom.getCoordinates()[0];
                // เส้นจากจุดล่าสุด -> เป้า
                draftSource.addFeature(new ol.Feature(new ol.geom.LineString([ring[ring.length - 2], crosshair])));
                // เส้นจากเป้า -> จุดเริ่ม (รูปปิด)
                if (ring.length > 3) {
                    draftSource.addFeature(new ol.Feature(new ol.geom.LineString([crosshair, ring[0]])));
                }
            }
        }

        function addPointAtCrosshair() {
            const crosshair = getCrosshairMapCoordinate();
            const features = measureSource.getFeatures();

            if (features.length > 0) {
                const geom = features[0].getGeometry();
                if (activeMeasureType === 'LineString') {
                    const c = geom.getCoordinates(); c.push(crosshair); geom.setCoordinates(c);
                } else {
                    const r = geom.getCoordinates()[0]; r.splice(r.length - 1, 0, crosshair); geom.setCoordinates([r]);
                }
            } else {
                const feat = activeMeasureType === 'LineString' 
                    ? new ol.Feature(new ol.geom.LineString([crosshair, crosshair]))
                    : new ol.Feature(new ol.geom.Polygon([[crosshair, crosshair, crosshair]]));
                measureSource.addFeature(feat);
            }
            updateDraftLine();
            updateStatus();
        }

        function undoPoint() {
            const feats = measureSource.getFeatures();
            if (!feats.length) return;
            const geom = feats[0].getGeometry();
            if (activeMeasureType === 'LineString') {
                const c = geom.getCoordinates(); 
                if (c.length > 2) { c.pop(); geom.setCoordinates(c); } else measureSource.clear();
            } else {
                const r = geom.getCoordinates()[0];
                if (r.length > 4) { r.splice(r.length - 2, 1); geom.setCoordinates([r]); } else measureSource.clear();
            }
            updateDraftLine();
            updateStatus();
        }

        function toggleMeasure(type) {
            const lineBtn = document.getElementById('measureLineBtn');
            const areaBtn = document.getElementById('measureAreaBtn');
            const cross = document.getElementById('crosshair');
            const ctrl = document.getElementById('drawControls');

            measureSource.clear(); draftSource.clear();
            if (activeMeasureType === type) {
                activeMeasureType = null;
                lineBtn.classList.remove('active'); areaBtn.classList.remove('active');
                cross.style.display = 'none'; ctrl.style.display = 'none';
                return;
            }
            activeMeasureType = type;
            lineBtn.classList.toggle('active', type === 'LineString');
            areaBtn.classList.toggle('active', type === 'Polygon');
            cross.style.display = 'block'; ctrl.style.display = 'flex';
        }

        function updateStatus() {
            const f = measureSource.getFeatures();
            if (!f.length) { document.getElementById('coordDisplay').textContent = "READY"; return; }
            const g = f[0].getGeometry();
            const val = activeMeasureType === 'LineString' ? ol.sphere.getLength(g) : ol.sphere.getArea(g);
            document.getElementById('coordDisplay').textContent = activeMeasureType === 'LineString' 
                ? (val > 1000 ? (val/1000).toFixed(2) + ' KM' : val.toFixed(1) + ' M')
                : formatThaiArea(val);
        }

        function formatThaiArea(sqm) {
            const r = Math.floor(sqm/1600), n = Math.floor((sqm%1600)/400), w = ((sqm%400)/4).toFixed(1);
            return `${r}-${n}-${w} ไร่`;
        }

        function getCurrentLocation() {
            navigator.geolocation.getCurrentPosition(p => {
                map.getView().animate({ center: ol.proj.fromLonLat([p.coords.longitude, p.coords.latitude]), zoom: 19 });
            });
        }

        document.getElementById('geojsonInput').addEventListener('change', async (e) => {
            for (const f of e.target.files) {
                const data = JSON.parse(await f.text());
                const src = new ol.source.Vector({ features: new ol.format.GeoJSON().readFeatures(data, { featureProjection:'EPSG:3857' }) });
                const layer = new ol.layer.Vector({
                    source: src,
                    style: new ol.style.Style({ stroke: new ol.style.Stroke({ color: '#3b82f6', width: 2.5 }), fill: new ol.style.Fill({ color: 'rgba(59, 130, 246, 0.1)' }) }),
                    properties: { isParcel: true, name: f.name }
                });
                map.addLayer(layer); vectorLayers.push(layer);
            }
        });

        window.onload = init;
    </script>
</body>
</html>
